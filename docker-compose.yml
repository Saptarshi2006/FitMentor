services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fitmentor
      POSTGRES_PASSWORD: fitmentor
      POSTGRES_DB: fitmentor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

volumes:
  pgdata:
  mongodata:
