app = 'fitmentor-api'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[http_service.concurrency]
  type = 'connections'
  hard_limit = 250
  soft_limit = 200

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
