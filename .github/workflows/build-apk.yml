name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" > /dev/null 2>&1 || true

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Setup Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx @capacitor/cli init --web-dir dist FitMentor ai.fitmentor.app

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web build to Android
        run: |
          mkdir -p dist
          cp -r .vercel/output/static/* dist/ 2>/dev/null || true
          npx cap copy

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --console=plain

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitMentor-APK
          path: android/app/build/outputs/apk/debug/*.apk
