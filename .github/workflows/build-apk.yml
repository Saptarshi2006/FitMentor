name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" || true

      - name: Install dependencies
        run: npm install

      - name: Setup Capacitor & add Android platform
        run: |
          # Write config using Node.js (avoid shell escaping issues)
          node -e "
            const fs = require('fs');
            const config = {
              appId: 'ai.fitmentor.app',
              appName: 'FitMentor',
              webDir: 'dist',
              server: { url: 'https://fitmentor-ai-ruddy.vercel.app', cleartext: false, androidScheme: 'https' }
            };
            fs.writeFileSync('capacitor.config.json', JSON.stringify(config, null, 2));
          "
          mkdir -p dist
          node -e "fs.writeFileSync('dist/index.html', '<!DOCTYPE html><html><head><meta charset=\"UTF-8\"><title>FitMentor</title></head><body></body></html>')"
          npx cap add android
          npx cap copy android

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --console=plain

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitMentor-APK
          path: android/app/build/outputs/apk/debug/*.apk
